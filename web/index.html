<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Harmonia — Language Lab - Student media for parents">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harmonia — Language Lab</title>
  <style>
    body { margin: 0; background: #f8f6f1; }
    .loading {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #f8f6f1; flex-direction: column; font-family: system-ui, sans-serif;
    }
    .loading-star { font-size: 48px; animation: pulse 1.5s infinite; }
    .loading-text { margin-top: 16px; color: #1a2744; font-weight: 700; font-size: 18px; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="loading-star">⭐</div>
    <div class="loading-text">Loading Harmonia — Language Lab...</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      document.getElementById('loading').style.display = 'none';
    });
  </script>
</body>
</html>
